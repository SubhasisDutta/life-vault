<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Life Vault</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg,#0F172A 0%,#1E293B 40%,#0F172A 100%);color:#E2E8F0;min-height:100vh}
.header{background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(236,72,153,0.1));border-bottom:1px solid rgba(255,255,255,0.08);padding:20px 24px 16px}
.header-inner{max-width:1400px;margin:0 auto}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#6366F1,#EC4899);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 15px rgba(99,102,241,0.4)}
.title{font-size:22px;font-weight:800;background:linear-gradient(90deg,#A5B4FC,#F9A8D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{font-size:12px;color:#94A3B8}
.stats-bar{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap;align-items:center}
.stat{text-align:center}.stat-value{font-size:18px;font-weight:800}.stat-label{font-size:10px;color:#94A3B8;text-transform:uppercase;letter-spacing:0.5px}
.filters{display:flex;gap:8px;margin-top:14px;align-items:center;flex-wrap:wrap}
.filter-btn{background:rgba(255,255,255,0.06);border:none;border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;color:#94A3B8;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px;transition:all 0.2s}
.filter-btn.active{color:white}
.search-input{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:6px 14px;font-size:12px;color:white;outline:none;width:220px;margin-left:auto}
.main{max-width:1400px;margin:0 auto;padding:20px 24px;display:flex;gap:20px}
.sidebar{width:280px;flex-shrink:0}.sidebar-inner{position:sticky;top:20px}
.sidebar-title{font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-left:4px}
.cat-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,0.02);border:1px solid transparent;border-radius:10px;cursor:pointer;text-align:left;transition:all 0.2s;width:100%;margin-bottom:4px}
.cat-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cat-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-prog-bar{height:3px;border-radius:2px;background:rgba(255,255,255,0.08);margin-top:4px;overflow:hidden}
.cat-prog-fill{height:100%;border-radius:2px;transition:width 0.4s ease}
.detail{flex:1;min-width:0}
.dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dash-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px;cursor:pointer;text-align:left;transition:all 0.25s;display:flex;gap:14px;align-items:flex-start}
.dash-card:hover{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.05)}
.folder-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;overflow:hidden;transition:all 0.2s;margin-bottom:10px}
.folder-btn{width:100%;display:flex;align-items:center;gap:12px;padding:14px 16px;background:transparent;border:none;cursor:pointer;text-align:left;color:#E2E8F0}
.folder-name{font-size:14px;font-weight:700;flex:1;color:#CBD5E1}
.folder-count{font-size:11px;color:#64748B;font-weight:600}
.folder-body{padding:0 16px 16px;display:none}
.folder-card.open .folder-body{display:block}
.folder-card.open{border-color:rgba(255,255,255,0.15)}
.inst-box{border-radius:8px;padding:10px 14px;margin-bottom:12px}
.inst-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.inst-text{font-size:12px;color:#CBD5E1;line-height:1.5}
.nok-toggle{background:rgba(236,72,153,0.08);border:1px solid rgba(236,72,153,0.2);border-radius:8px;padding:8px 14px;margin-bottom:12px;cursor:pointer;font-size:11px;font-weight:700;color:#F9A8D4;text-transform:uppercase;letter-spacing:0.5px;width:100%;text-align:left}
.nok-box{background:rgba(236,72,153,0.06);border-radius:8px;padding:10px 14px;margin-bottom:12px;border:1px solid rgba(236,72,153,0.15);display:none}
.nok-box.show{display:block}
.links-row{margin-bottom:12px;display:flex;flex-wrap:wrap;gap:6px}
.link-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);border-radius:6px;padding:5px 10px;font-size:11px;color:#6EE7B7;text-decoration:none;font-weight:600}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all 0.15s}
.check-item.done{background:rgba(52,211,153,0.06);border-color:rgba(52,211,153,0.15)}
.check-item input[type=checkbox]{margin-top:2px;flex-shrink:0;cursor:pointer;width:16px;height:16px}
.check-text{font-size:13px;line-height:1.4;flex:1;color:#CBD5E1}
.check-text.done{color:#6EE7B7;text-decoration:line-through;opacity:0.7}
.priority-badge{font-size:9px;font-weight:800;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0;margin-top:2px}
.detail-btn{background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);border-radius:6px;padding:4px 10px;font-size:10px;font-weight:700;color:#A5B4FC;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0;margin-top:1px;transition:all 0.2s}
.detail-btn:hover{background:rgba(99,102,241,0.3)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:#1E293B;border:1px solid rgba(255,255,255,0.1);border-radius:16px;max-width:850px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,0.5)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;background:#1E293B;z-index:1;border-radius:16px 16px 0 0}
.modal-title{font-size:18px;font-weight:800;color:white}
.modal-close{background:rgba(255,255,255,0.1);border:none;border-radius:8px;width:36px;height:36px;font-size:18px;color:#94A3B8;cursor:pointer}
.modal-close:hover{background:rgba(255,255,255,0.2);color:white}
.modal-body{padding:24px}
.tpl-section{margin-bottom:24px}
.tpl-section-title{font-size:14px;font-weight:700;color:white;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.08)}
.tpl-field{margin-bottom:16px}
.tpl-label{font-size:12px;font-weight:600;color:#A5B4FC;margin-bottom:6px;display:block}
.tpl-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;font-size:13px;color:white;outline:none;font-family:inherit}
.tpl-input:focus{border-color:rgba(99,102,241,0.5)}
.tpl-textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;font-size:13px;color:white;outline:none;font-family:inherit;min-height:80px;resize:vertical}
.tpl-textarea:focus{border-color:rgba(99,102,241,0.5)}
.tpl-hint{font-size:11px;color:#64748B;margin-top:4px;font-style:italic}
.save-btn{background:linear-gradient(135deg,#6366F1,#EC4899);border:none;border-radius:10px;padding:12px 28px;font-size:14px;font-weight:700;color:white;cursor:pointer;transition:opacity 0.2s}
.save-btn:hover{opacity:0.9}
.export-btn{background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);border-radius:10px;padding:12px 28px;font-size:14px;font-weight:700;color:#6EE7B7;cursor:pointer;margin-left:8px}
.welcome-box{background:linear-gradient(135deg,rgba(99,102,241,0.1),rgba(236,72,153,0.08));border-radius:16px;padding:24px;border:1px solid rgba(255,255,255,0.08);margin-bottom:20px}
.quick-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.quick-link{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,0.08);border-radius:6px;padding:5px 12px;font-size:11px;text-decoration:none;font-weight:600;border:1px solid rgba(255,255,255,0.1)}
.footer{border-top:1px solid rgba(255,255,255,0.05);padding:16px 24px;text-align:center;margin-top:40px}
.footer p{font-size:11px;color:#475569}
.action-bar{display:flex;gap:6px;margin-left:auto}
.action-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#CBD5E1;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer}
.reset-btn{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#FCA5A5;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.arrow{font-size:14px;color:#64748B;transition:transform 0.2s}
.folder-card.open .arrow{transform:rotate(180deg)}
@media(max-width:900px){.main{flex-direction:column}.sidebar{width:100%}.dashboard-grid{grid-template-columns:1fr}}
.setup-wizard{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#0F172A 0%,#1E293B 40%,#0F172A 100%);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px}
.setup-card{background:#1E293B;border:1px solid rgba(255,255,255,0.1);border-radius:20px;max-width:600px;width:100%;padding:40px;box-shadow:0 25px 50px rgba(0,0,0,0.5)}
.setup-logo{width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,#6366F1,#EC4899);display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 24px;box-shadow:0 4px 15px rgba(99,102,241,0.4)}
.setup-title{font-size:28px;font-weight:800;text-align:center;margin-bottom:8px;background:linear-gradient(90deg,#A5B4FC,#F9A8D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.setup-subtitle{font-size:14px;color:#94A3B8;text-align:center;margin-bottom:32px}
.setup-step{display:none}.setup-step.active{display:block}
.setup-field{margin-bottom:20px}
.setup-label{display:block;font-size:13px;font-weight:600;color:#A5B4FC;margin-bottom:8px}
.setup-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:14px 16px;font-size:14px;color:white;outline:none}
.setup-input:focus{border-color:rgba(99,102,241,0.5)}
.setup-hint{font-size:11px;color:#64748B;margin-top:6px}
.setup-nav{display:flex;gap:12px;margin-top:32px}
.setup-btn{flex:1;background:linear-gradient(135deg,#6366F1,#EC4899);border:none;border-radius:10px;padding:14px 24px;font-size:14px;font-weight:700;color:white;cursor:pointer}
.setup-btn.secondary{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15)}
.setup-btn:disabled{opacity:0.5;cursor:not-allowed}
.setup-progress{display:flex;gap:8px;justify-content:center;margin-bottom:24px}
.setup-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.2)}
.setup-dot.active{background:linear-gradient(135deg,#6366F1,#EC4899)}
.setup-dot.completed{background:#34D399}
.children-list{margin-top:12px}
.child-item{display:flex;gap:8px;margin-bottom:8px}
.child-item input{flex:1}
.child-remove{background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.3);color:#FCA5A5;border-radius:8px;padding:0 12px;cursor:pointer;font-size:18px}
.add-child-btn{background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);color:#6EE7B7;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}
.settings-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#CBD5E1;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.settings-modal .tpl-section{margin-bottom:20px}
.bank-list,.link-list{margin-top:8px}
.bank-item,.link-item{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.bank-item input,.link-item input{flex:1}
.remove-item-btn{background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.3);color:#FCA5A5;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:14px}
.add-item-btn{background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);color:#6EE7B7;border-radius:6px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;margin-top:4px}
</style>
</head>
<body>
<div id="app"></div>
<script src="data.js"></script>
<script src="templates.js"></script>
<script src="app.js"></script>
</body>
</html>
