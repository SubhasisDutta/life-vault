<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Life Vault</title>
<style>
/* === CSS VARIABLES FOR THEME === */
:root {
  /* Dark Theme (Default) */
  --bg-primary: linear-gradient(135deg, #0F172A 0%, #1E293B 40%, #0F172A 100%);
  --bg-secondary: rgba(255, 255, 255, 0.03);
  --bg-tertiary: rgba(255, 255, 255, 0.06);
  --bg-glass: rgba(30, 41, 59, 0.8);
  --bg-glass-strong: rgba(30, 41, 59, 0.95);
  --bg-overlay: rgba(0, 0, 0, 0.6);

  --text-primary: #F8FAFC;
  --text-secondary: #E2E8F0;
  --text-tertiary: #CBD5E1;
  --text-muted: #94A3B8;
  --text-dim: #64748B;

  --border-subtle: rgba(255, 255, 255, 0.08);
  --border-light: rgba(255, 255, 255, 0.12);
  --border-medium: rgba(255, 255, 255, 0.18);

  --accent-primary: #6366F1;
  --accent-secondary: #8B5CF6;
  --accent-tertiary: #EC4899;
  --accent-success: #34D399;
  --accent-warning: #FBBF24;
  --accent-danger: #EF4444;

  --glass-blur: blur(20px);
  --glass-saturate: saturate(180%);
  --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.3);
  --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);

  --gradient-primary: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #EC4899 100%);
  --gradient-header: linear-gradient(135deg, rgba(99, 102, 241, 0.12), rgba(139, 92, 246, 0.08), rgba(236, 72, 153, 0.08));
  --gradient-card: linear-gradient(135deg, rgba(99, 102, 241, 0.08), rgba(236, 72, 153, 0.05));
}

/* Light Theme */
[data-theme="light"] {
  --bg-primary: linear-gradient(135deg, #F0F4FF 0%, #E8EEFF 40%, #F5F3FF 100%);
  --bg-secondary: rgba(255, 255, 255, 0.75);
  --bg-tertiary: rgba(255, 255, 255, 0.6);
  --bg-glass: rgba(255, 255, 255, 0.8);
  --bg-glass-strong: rgba(255, 255, 255, 0.95);
  --bg-overlay: rgba(15, 23, 42, 0.5);

  /* Darker text colors for better contrast */
  --text-primary: #0F172A;
  --text-secondary: #1E293B;
  --text-tertiary: #1E293B;
  --text-muted: #475569;
  --text-dim: #64748B;

  --border-subtle: rgba(99, 102, 241, 0.15);
  --border-light: rgba(99, 102, 241, 0.22);
  --border-medium: rgba(99, 102, 241, 0.30);

  --accent-primary: #4F46E5;
  --accent-secondary: #7C3AED;
  --accent-tertiary: #DB2777;
  --accent-success: #059669;
  --accent-warning: #D97706;
  --accent-danger: #DC2626;

  --glass-blur: blur(20px);
  --glass-saturate: saturate(150%);
  --shadow-glass: 0 8px 32px rgba(99, 102, 241, 0.15);
  --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.12);

  --gradient-primary: linear-gradient(135deg, #4F46E5 0%, #7C3AED 50%, #DB2777 100%);
  --gradient-header: linear-gradient(135deg, rgba(99, 102, 241, 0.12), rgba(139, 92, 246, 0.08), rgba(236, 72, 153, 0.06));
  --gradient-card: linear-gradient(135deg, rgba(99, 102, 241, 0.08), rgba(236, 72, 153, 0.05));
}

/* === BASE STYLES === */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-primary);color:var(--text-secondary);min-height:100vh;transition:background 0.3s ease, color 0.3s ease}

/* === GLASSMORPHISM HEADER === */
.header{
  background:var(--gradient-header);
  backdrop-filter:var(--glass-blur) var(--glass-saturate);
  -webkit-backdrop-filter:var(--glass-blur) var(--glass-saturate);
  border-bottom:1px solid var(--border-subtle);
  padding:20px 24px 16px;
  box-shadow:var(--shadow-glass);
}
.header-inner{max-width:1400px;margin:0 auto}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.logo{
  width:44px;height:44px;border-radius:12px;
  background:var(--gradient-primary);
  display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:0 4px 15px rgba(99,102,241,0.4);
  border:1px solid rgba(255,255,255,0.2);
}
.title{font-size:22px;font-weight:800;background:linear-gradient(90deg,var(--accent-primary),var(--accent-tertiary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:12px;color:var(--text-muted)}
.stats-bar{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap;align-items:center}
.stat{text-align:center}.stat-value{font-size:18px;font-weight:800}.stat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px}

/* === GLASSMORPHISM FILTERS === */
.filters{display:flex;gap:8px;margin-top:14px;align-items:center;flex-wrap:wrap}
.filter-btn{
  background:var(--bg-tertiary);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border-subtle);
  border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;
  color:var(--text-muted);cursor:pointer;text-transform:uppercase;letter-spacing:0.5px;
  transition:all 0.3s ease;
}
.filter-btn:hover{border-color:var(--border-medium);color:var(--text-tertiary)}
.filter-btn.active{color:var(--text-primary);border-color:var(--accent-primary)}
.search-input{
  background:var(--bg-tertiary);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border-subtle);border-radius:8px;padding:6px 14px;font-size:12px;
  color:var(--text-primary);outline:none;width:220px;margin-left:auto;
  transition:all 0.3s ease;
}
.search-input:focus{border-color:var(--accent-primary);box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
.search-input::placeholder{color:var(--text-dim)}

/* === MAIN LAYOUT === */
.main{max-width:1400px;margin:0 auto;padding:20px 24px;display:flex;gap:20px}

/* === GLASSMORPHISM SIDEBAR === */
.sidebar{width:280px;flex-shrink:0}.sidebar-inner{position:sticky;top:20px}
.sidebar-title{font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-left:4px}
.cat-btn{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--bg-secondary);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border-subtle);border-radius:10px;cursor:pointer;text-align:left;
  transition:all 0.3s ease;width:100%;margin-bottom:4px;
}
.cat-btn:hover{border-color:var(--border-medium);background:var(--bg-tertiary)}
.cat-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cat-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-tertiary)}
.cat-prog-bar{height:3px;border-radius:2px;background:var(--border-subtle);margin-top:4px;overflow:hidden}
.cat-prog-fill{height:100%;border-radius:2px;transition:width 0.4s ease}
.detail{flex:1;min-width:0}

/* === GLASSMORPHISM DASHBOARD GRID === */
.dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dash-card{
  background:var(--bg-secondary);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border-subtle);border-radius:16px;padding:16px;cursor:pointer;text-align:left;
  transition:all 0.3s ease;display:flex;gap:14px;align-items:flex-start;
  box-shadow:var(--shadow-glass);
}
.dash-card:hover{border-color:var(--border-medium);transform:translateY(-2px);box-shadow:var(--shadow-glow)}

/* === GLASSMORPHISM FOLDER CARDS === */
.folder-card{
  background:var(--bg-secondary);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border-subtle);border-radius:12px;overflow:hidden;
  transition:all 0.3s ease;margin-bottom:10px;
  box-shadow:var(--shadow-glass);
}
.folder-btn{width:100%;display:flex;align-items:center;gap:12px;padding:14px 16px;background:transparent;border:none;cursor:pointer;text-align:left;color:var(--text-secondary)}
.folder-name{font-size:14px;font-weight:700;flex:1;color:var(--text-tertiary)}
.folder-count{font-size:11px;color:var(--text-dim);font-weight:600}
.folder-body{padding:0 16px 16px;display:none}
.folder-card.open .folder-body{display:block}
.folder-card.open{border-color:var(--border-medium)}

/* === INSTRUCTIONS & NOK === */
.inst-box{border-radius:8px;padding:10px 14px;margin-bottom:12px;backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur)}
.inst-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.inst-text{font-size:12px;color:var(--text-tertiary);line-height:1.5}
.nok-toggle{
  background:rgba(236,72,153,0.08);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid rgba(236,72,153,0.2);border-radius:8px;padding:8px 14px;margin-bottom:12px;cursor:pointer;
  font-size:11px;font-weight:700;color:#F9A8D4;text-transform:uppercase;letter-spacing:0.5px;width:100%;text-align:left;
  transition:all 0.3s ease;
}
.nok-toggle:hover{background:rgba(236,72,153,0.12)}
.nok-box{
  background:rgba(236,72,153,0.06);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border-radius:8px;padding:10px 14px;margin-bottom:12px;border:1px solid rgba(236,72,153,0.15);display:none
}
.nok-box.show{display:block}

/* === LINKS === */
.links-row{margin-bottom:12px;display:flex;flex-wrap:wrap;gap:6px}
.link-chip{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(52,211,153,0.08);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid rgba(52,211,153,0.2);border-radius:6px;padding:5px 10px;
  font-size:11px;color:#6EE7B7;text-decoration:none;font-weight:600;
  transition:all 0.3s ease;
}
.link-chip:hover{background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.3)}

/* === CHECKLIST ITEMS === */
.check-item{
  display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;
  border:1px solid transparent;transition:all 0.2s;
  background:var(--bg-secondary);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  margin-bottom:4px;
}
.check-item:hover{border-color:var(--border-light)}
.check-item.done{background:rgba(52,211,153,0.08);border-color:rgba(52,211,153,0.15)}
.check-item input[type=checkbox]{margin-top:2px;flex-shrink:0;cursor:pointer;width:16px;height:16px;accent-color:var(--accent-primary)}
.check-text{font-size:13px;line-height:1.4;flex:1;color:var(--text-tertiary)}
.check-text.done{color:#6EE7B7;text-decoration:line-through;opacity:0.7}
.priority-badge{font-size:9px;font-weight:800;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0;margin-top:2px}
.detail-btn{
  background:rgba(99,102,241,0.15);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid rgba(99,102,241,0.3);border-radius:6px;padding:4px 10px;
  font-size:10px;font-weight:700;color:#A5B4FC;cursor:pointer;
  text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0;margin-top:1px;
  transition:all 0.3s ease;
}
.detail-btn:hover{background:rgba(99,102,241,0.25);border-color:rgba(99,102,241,0.4)}

/* === GLASSMORPHISM MODAL === */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg-overlay);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{
  background:var(--bg-glass-strong);
  backdrop-filter:var(--glass-blur) var(--glass-saturate);
  -webkit-backdrop-filter:var(--glass-blur) var(--glass-saturate);
  border:1px solid var(--border-light);border-radius:20px;max-width:850px;width:100%;max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow-glass),var(--shadow-glow);
}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;padding:20px 24px;
  border-bottom:1px solid var(--border-subtle);position:sticky;top:0;
  background:var(--bg-glass-strong);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  z-index:1;border-radius:20px 20px 0 0;
}
.modal-title{font-size:18px;font-weight:800;color:var(--text-primary)}
.modal-close{
  background:var(--bg-tertiary);border:1px solid var(--border-subtle);border-radius:8px;
  width:36px;height:36px;font-size:18px;color:var(--text-muted);cursor:pointer;
  transition:all 0.3s ease;
}
.modal-close:hover{background:var(--border-light);color:var(--text-primary)}
.modal-body{padding:24px}

/* === FORM ELEMENTS === */
.tpl-section{margin-bottom:24px}
.tpl-section-title{font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border-subtle)}
.tpl-field{margin-bottom:16px}
.tpl-label{font-size:12px;font-weight:600;color:var(--accent-primary);margin-bottom:6px;display:block}
.tpl-input{
  width:100%;background:var(--bg-tertiary);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border-subtle);border-radius:8px;padding:10px 14px;
  font-size:13px;color:var(--text-primary);outline:none;font-family:inherit;
  transition:all 0.3s ease;
}
.tpl-input:focus{border-color:var(--accent-primary);box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
.tpl-input::placeholder{color:var(--text-dim)}
.tpl-textarea{
  width:100%;background:var(--bg-tertiary);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border-subtle);border-radius:8px;padding:10px 14px;
  font-size:13px;color:var(--text-primary);outline:none;font-family:inherit;min-height:80px;resize:vertical;
  transition:all 0.3s ease;
}
.tpl-textarea:focus{border-color:var(--accent-primary);box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
.tpl-textarea::placeholder{color:var(--text-dim)}
.tpl-hint{font-size:11px;color:var(--text-dim);margin-top:4px;font-style:italic}

/* === BUTTONS === */
.save-btn{
  background:var(--gradient-primary);border:none;border-radius:10px;padding:12px 28px;
  font-size:14px;font-weight:700;color:white;cursor:pointer;
  transition:all 0.3s ease;box-shadow:0 4px 15px rgba(99,102,241,0.3);
}
.save-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,0.4)}
.export-btn{
  background:rgba(52,211,153,0.15);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid rgba(52,211,153,0.3);border-radius:10px;padding:12px 28px;
  font-size:14px;font-weight:700;color:#6EE7B7;cursor:pointer;margin-left:8px;
  transition:all 0.3s ease;
}
.export-btn:hover{background:rgba(52,211,153,0.25)}

/* === WELCOME BOX === */
.welcome-box{
  background:var(--gradient-card);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border-radius:16px;padding:24px;border:1px solid var(--border-subtle);margin-bottom:20px;
  box-shadow:var(--shadow-glass);
}
.quick-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.quick-link{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--bg-tertiary);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border-radius:6px;padding:5px 12px;font-size:11px;text-decoration:none;font-weight:600;
  border:1px solid var(--border-subtle);color:var(--accent-primary);
  transition:all 0.3s ease;
}
.quick-link:hover{border-color:var(--accent-primary);background:rgba(99,102,241,0.1)}

/* === FOOTER === */
.footer{border-top:1px solid var(--border-subtle);padding:16px 24px;text-align:center;margin-top:40px}
.footer p{font-size:11px;color:var(--text-dim)}

/* === ACTION BUTTONS === */
.action-bar{display:flex;gap:6px;margin-left:auto}
.action-btn{
  background:var(--bg-tertiary);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border-subtle);color:var(--text-tertiary);border-radius:8px;
  padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;
  transition:all 0.3s ease;
}
.action-btn:hover{border-color:var(--border-medium)}
.reset-btn{
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#FCA5A5;
  border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;
  transition:all 0.3s ease;
}
.reset-btn:hover{background:rgba(239,68,68,0.2)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.arrow{font-size:14px;color:var(--text-dim);transition:transform 0.2s}
.folder-card.open .arrow{transform:rotate(180deg)}

/* === THEME TOGGLE === */
.theme-toggle{
  background:var(--bg-tertiary);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border-subtle);border-radius:8px;
  padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:6px;color:var(--text-tertiary);
  transition:all 0.3s ease;
}
.theme-toggle:hover{border-color:var(--border-medium);color:var(--text-primary)}
.theme-toggle-icon{font-size:14px}

/* === RESPONSIVE === */
@media(max-width:900px){.main{flex-direction:column}.sidebar{width:100%}.dashboard-grid{grid-template-columns:1fr}}

/* === GLASSMORPHISM SETUP WIZARD === */
.setup-wizard{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg-primary);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px}
.setup-card{
  background:var(--bg-glass-strong);
  backdrop-filter:var(--glass-blur) var(--glass-saturate);
  -webkit-backdrop-filter:var(--glass-blur) var(--glass-saturate);
  border:1px solid var(--border-light);border-radius:24px;max-width:600px;width:100%;padding:40px;
  box-shadow:var(--shadow-glass),var(--shadow-glow);
}
.setup-logo{
  width:80px;height:80px;border-radius:20px;
  background:var(--gradient-primary);
  display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 24px;
  box-shadow:0 4px 15px rgba(99,102,241,0.4);border:2px solid rgba(255,255,255,0.2);
}
.setup-title{font-size:28px;font-weight:800;text-align:center;margin-bottom:8px;background:linear-gradient(90deg,var(--accent-primary),var(--accent-tertiary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.setup-subtitle{font-size:14px;color:var(--text-muted);text-align:center;margin-bottom:32px}
.setup-step{display:none}.setup-step.active{display:block}
.setup-field{margin-bottom:20px}
.setup-label{display:block;font-size:13px;font-weight:600;color:var(--accent-primary);margin-bottom:8px}
.setup-input{
  width:100%;background:var(--bg-tertiary);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border-subtle);border-radius:10px;padding:14px 16px;
  font-size:14px;color:var(--text-primary);outline:none;
  transition:all 0.3s ease;
}
.setup-input:focus{border-color:var(--accent-primary);box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
.setup-input::placeholder{color:var(--text-dim)}
.setup-hint{font-size:11px;color:var(--text-dim);margin-top:6px}
.setup-nav{display:flex;gap:12px;margin-top:32px}
.setup-btn{
  flex:1;background:var(--gradient-primary);border:none;border-radius:10px;padding:14px 24px;
  font-size:14px;font-weight:700;color:white;cursor:pointer;
  transition:all 0.3s ease;box-shadow:0 4px 15px rgba(99,102,241,0.3);
}
.setup-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,0.4)}
.setup-btn.secondary{
  background:var(--bg-tertiary);border:1px solid var(--border-subtle);color:var(--text-tertiary);
  box-shadow:none;
}
.setup-btn.secondary:hover{border-color:var(--border-medium);transform:none}
.setup-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.setup-progress{display:flex;gap:8px;justify-content:center;margin-bottom:24px}
.setup-dot{width:10px;height:10px;border-radius:50%;background:var(--border-subtle);transition:all 0.3s ease}
.setup-dot.active{background:var(--gradient-primary)}
.setup-dot.completed{background:var(--accent-success)}
.children-list{margin-top:12px}
.child-item{display:flex;gap:8px;margin-bottom:8px}
.child-item input{flex:1}
.child-remove{background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.3);color:#FCA5A5;border-radius:8px;padding:0 12px;cursor:pointer;font-size:18px;transition:all 0.3s ease}
.child-remove:hover{background:rgba(239,68,68,0.3)}
.add-child-btn{
  background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);color:#6EE7B7;
  border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;
  transition:all 0.3s ease;
}
.add-child-btn:hover{background:rgba(52,211,153,0.25)}

/* === HOUSEHOLD TYPE OPTIONS === */
.household-options{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.household-option{
  flex:1;min-width:120px;max-width:160px;background:var(--bg-tertiary);border:2px solid var(--border-subtle);
  border-radius:12px;padding:20px 16px;cursor:pointer;text-align:center;transition:all 0.3s ease;
}
.household-option:hover{border-color:var(--accent-primary);transform:translateY(-2px)}
.household-option.active{border-color:var(--accent-primary);background:rgba(99,102,241,0.15);box-shadow:0 0 20px rgba(99,102,241,0.2)}
.household-icon{font-size:32px;margin-bottom:8px}
.household-label{font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:4px}
.household-desc{font-size:11px;color:var(--text-tertiary)}
.household-options-settings{display:flex;gap:8px;flex-wrap:wrap}
.household-option-sm{
  display:flex;align-items:center;gap:6px;background:var(--bg-tertiary);border:1px solid var(--border-subtle);
  border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-secondary);
  transition:all 0.3s ease;
}
.household-option-sm:hover{border-color:var(--accent-primary);color:var(--text-primary)}
.household-option-sm.active{border-color:var(--accent-primary);background:rgba(99,102,241,0.15);color:var(--accent-primary)}
.household-option-sm span{font-size:16px}

/* === SETTINGS BUTTON === */
.settings-btn{
  background:var(--bg-tertiary);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border-subtle);color:var(--text-tertiary);border-radius:8px;
  padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:all 0.3s ease;
}
.settings-btn:hover{border-color:var(--border-medium);color:var(--text-primary)}
.settings-modal .tpl-section{margin-bottom:20px}
.bank-list,.link-list{margin-top:8px}
.bank-item,.link-item{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.bank-item input,.link-item input{flex:1}
.remove-item-btn{background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.3);color:#FCA5A5;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:14px;transition:all 0.3s ease}
.remove-item-btn:hover{background:rgba(239,68,68,0.3)}
.add-item-btn{background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);color:#6EE7B7;border-radius:6px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;margin-top:4px;transition:all 0.3s ease}
.add-item-btn:hover{background:rgba(52,211,153,0.25)}

/* === HELP MODAL === */
.help-modal{max-width:900px;max-height:85vh}
.help-nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border-subtle)}
.help-nav-btn{
  background:var(--bg-tertiary);border:1px solid var(--border-subtle);border-radius:20px;
  padding:6px 14px;font-size:11px;font-weight:600;color:var(--text-muted);cursor:pointer;
  transition:all 0.3s ease;
}
.help-nav-btn.active{background:rgba(99,102,241,0.2);border-color:rgba(99,102,241,0.4);color:var(--accent-primary)}
.help-nav-btn:hover{border-color:var(--border-medium);color:var(--text-tertiary)}
.help-search{
  background:var(--bg-tertiary);border:1px solid var(--border-subtle);border-radius:8px;
  padding:10px 14px;font-size:13px;color:var(--text-primary);outline:none;width:100%;margin-bottom:16px;
  transition:all 0.3s ease;
}
.help-search:focus{border-color:var(--accent-primary);box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
.help-search::placeholder{color:var(--text-dim)}
.help-section{margin-bottom:24px}
.help-section-title{font-size:16px;font-weight:700;color:var(--text-primary);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.help-section-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.help-category{
  background:var(--bg-secondary);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border-subtle);border-radius:10px;margin-bottom:12px;overflow:hidden;
  transition:all 0.3s ease;
}
.help-category:hover{border-color:var(--border-light)}
.help-category-header{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background 0.2s}
.help-category-header:hover{background:var(--bg-tertiary)}
.help-category-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.help-category-info{flex:1;min-width:0}
.help-category-name{font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:2px}
.help-category-desc{font-size:11px;color:var(--text-muted);line-height:1.4}
.help-category-meta{font-size:10px;color:var(--text-dim);margin-top:4px}
.help-category-arrow{color:var(--text-dim);transition:transform 0.2s;font-size:12px}
.help-category.open .help-category-arrow{transform:rotate(180deg)}
.help-category-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border-subtle)}
.help-category.open .help-category-body{display:block}
.help-folder{background:var(--bg-tertiary);border-radius:8px;padding:12px;margin-top:10px}
.help-folder-name{font-size:12px;font-weight:600;color:var(--text-tertiary);margin-bottom:6px}
.help-folder-instructions{font-size:11px;color:var(--text-muted);line-height:1.5;margin-bottom:8px}
.help-folder-items{font-size:11px;color:var(--text-dim)}
.help-video-card{
  background:linear-gradient(135deg,rgba(239,68,68,0.1),rgba(239,68,68,0.05));
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:14px;margin-bottom:10px;
  display:flex;gap:12px;align-items:flex-start;transition:all 0.3s ease;
}
.help-video-card:hover{border-color:rgba(239,68,68,0.3)}
.help-video-icon{font-size:24px;flex-shrink:0}
.help-video-info{flex:1}
.help-video-title{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:4px}
.help-video-desc{font-size:11px;color:var(--text-muted);line-height:1.4;margin-bottom:6px}
.help-video-link{font-size:11px;color:#F87171;text-decoration:none;font-weight:600}
.help-video-link:hover{text-decoration:underline}
.help-tip{
  background:rgba(52,211,153,0.08);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid rgba(52,211,153,0.2);border-radius:8px;padding:12px;margin-bottom:12px;
  transition:all 0.3s ease;
}
.help-tip:hover{border-color:rgba(52,211,153,0.3)}
.help-tip-title{font-size:12px;font-weight:700;color:#6EE7B7;margin-bottom:4px}
.help-tip-text{font-size:11px;color:var(--text-muted);line-height:1.5}
.help-intro{
  background:var(--gradient-card);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid var(--border-subtle);
  box-shadow:var(--shadow-glass);
}
.help-intro h3{font-size:16px;font-weight:700;color:var(--text-primary);margin-bottom:8px}
.help-intro p{font-size:13px;color:var(--text-tertiary);line-height:1.6}

/* === HELP RESOURCES === */
.help-resource-category{transition:all 0.3s ease}
.help-resource-category:hover{border-color:var(--border-medium) !important}
.help-resource-video-card{transition:all 0.3s ease}
.help-resource-video-card:hover{border-color:rgba(239,68,68,0.4) !important}
.help-resource-article-card:hover{border-color:rgba(52,211,153,0.4) !important;transform:translateY(-1px)}

/* === THEME SETTINGS SECTION === */
.theme-section{
  background:var(--gradient-card);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border-subtle);border-radius:12px;padding:16px;margin-bottom:20px;
}
.theme-options{display:flex;gap:12px;margin-top:12px}
.theme-option{
  flex:1;background:var(--bg-tertiary);border:2px solid var(--border-subtle);border-radius:12px;
  padding:16px;cursor:pointer;text-align:center;transition:all 0.3s ease;
}
.theme-option:hover{border-color:var(--border-medium)}
.theme-option.active{border-color:var(--accent-primary);box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
.theme-option-icon{font-size:28px;margin-bottom:8px}
.theme-option-label{font-size:13px;font-weight:600;color:var(--text-primary)}
.theme-option-desc{font-size:11px;color:var(--text-muted);margin-top:4px}

/* === LIGHT MODE CONTRAST OVERRIDES === */
[data-theme="light"] .cat-name{color:#1E293B}
[data-theme="light"] .cat-btn:hover .cat-name{color:#0F172A}
[data-theme="light"] .folder-name{color:#1E293B}
[data-theme="light"] .folder-btn{color:#1E293B}
[data-theme="light"] .check-text{color:#334155}
[data-theme="light"] .check-text.done{color:#047857}
[data-theme="light"] .inst-text{color:#334155}
[data-theme="light"] .stat-value{filter:brightness(0.85)}
[data-theme="light"] .sidebar-title{color:#475569}
[data-theme="light"] .tpl-hint{color:#475569}
[data-theme="light"] .setup-hint{color:#475569}
[data-theme="light"] .help-folder-name{color:#1E293B}
[data-theme="light"] .help-folder-instructions{color:#475569}
[data-theme="light"] .help-category-desc{color:#475569}
[data-theme="light"] .help-tip-text{color:#475569}
[data-theme="light"] .help-video-desc{color:#475569}
[data-theme="light"] .welcome-box{background:linear-gradient(135deg,rgba(99,102,241,0.12),rgba(236,72,153,0.08))}
[data-theme="light"] .dash-card{background:rgba(255,255,255,0.8);border-color:rgba(99,102,241,0.15)}
[data-theme="light"] .folder-card{background:rgba(255,255,255,0.8);border-color:rgba(99,102,241,0.12)}
[data-theme="light"] .cat-btn{background:rgba(255,255,255,0.6);border-color:rgba(99,102,241,0.1)}
[data-theme="light"] .cat-btn:hover{background:rgba(255,255,255,0.85);border-color:rgba(99,102,241,0.2)}
[data-theme="light"] .check-item{background:rgba(255,255,255,0.7)}
[data-theme="light"] .check-item.done{background:rgba(5,150,105,0.1);border-color:rgba(5,150,105,0.25)}
[data-theme="light"] .modal{background:rgba(255,255,255,0.98)}
[data-theme="light"] .modal-header{background:rgba(255,255,255,0.98)}
[data-theme="light"] .setup-card{background:rgba(255,255,255,0.98)}
[data-theme="light"] .help-category{background:rgba(255,255,255,0.8)}
[data-theme="light"] .help-folder{background:rgba(240,244,255,0.8)}
[data-theme="light"] .filter-btn{background:rgba(255,255,255,0.7);color:#475569}
[data-theme="light"] .filter-btn:hover{color:#1E293B}
[data-theme="light"] .filter-btn.active{color:#4F46E5;background:rgba(79,70,229,0.1)}
[data-theme="light"] .search-input{background:rgba(255,255,255,0.8)}
[data-theme="light"] .search-input::placeholder{color:#64748B}
[data-theme="light"] .tpl-input{background:rgba(255,255,255,0.8)}
[data-theme="light"] .tpl-textarea{background:rgba(255,255,255,0.8)}
[data-theme="light"] .setup-input{background:rgba(255,255,255,0.8)}
[data-theme="light"] .help-search{background:rgba(255,255,255,0.8)}
[data-theme="light"] .settings-btn{background:rgba(255,255,255,0.7);color:#334155}
[data-theme="light"] .settings-btn:hover{color:#1E293B}
[data-theme="light"] .theme-toggle{background:rgba(255,255,255,0.7);color:#334155}
[data-theme="light"] .theme-toggle:hover{color:#1E293B}
[data-theme="light"] .action-btn{background:rgba(255,255,255,0.7);color:#334155}
[data-theme="light"] .theme-option{background:rgba(255,255,255,0.8)}
[data-theme="light"] .theme-section{background:rgba(240,244,255,0.6)}
[data-theme="light"] .nok-toggle{background:rgba(219,39,119,0.1);color:#BE185D}
[data-theme="light"] .nok-box{background:rgba(219,39,119,0.08);border-color:rgba(219,39,119,0.2)}
[data-theme="light"] .link-chip{background:rgba(5,150,105,0.1);color:#047857;border-color:rgba(5,150,105,0.25)}
[data-theme="light"] .detail-btn{background:rgba(79,70,229,0.1);color:#4F46E5;border-color:rgba(79,70,229,0.25)}
[data-theme="light"] .add-child-btn{background:rgba(5,150,105,0.12);color:#047857;border-color:rgba(5,150,105,0.25)}
[data-theme="light"] .add-item-btn{background:rgba(5,150,105,0.12);color:#047857;border-color:rgba(5,150,105,0.25)}
[data-theme="light"] .export-btn{background:rgba(5,150,105,0.12);color:#047857;border-color:rgba(5,150,105,0.25)}
[data-theme="light"] .export-btn[data-action="export-pdf"]{background:rgba(79,70,229,0.12) !important;color:#4338CA !important;border-color:rgba(79,70,229,0.3) !important}
[data-theme="light"] .help-nav-btn{background:rgba(255,255,255,0.7);color:#475569}
[data-theme="light"] .help-nav-btn.active{background:rgba(79,70,229,0.15);color:#4F46E5}
[data-theme="light"] .help-tip{background:rgba(5,150,105,0.1);border-color:rgba(5,150,105,0.2)}
[data-theme="light"] .help-tip-title{color:#047857}
[data-theme="light"] .help-video-card{background:linear-gradient(135deg,rgba(220,38,38,0.08),rgba(220,38,38,0.04))}
[data-theme="light"] .help-video-link{color:#DC2626}
[data-theme="light"] .help-resource-video-card{border-color:rgba(220,38,38,0.15) !important}
[data-theme="light"] .help-resource-article-card{border-color:rgba(5,150,105,0.15) !important;background:linear-gradient(135deg,rgba(5,150,105,0.06),rgba(5,150,105,0.02)) !important}
[data-theme="light"] .help-resource-category{background:rgba(255,255,255,0.8) !important}
[data-theme="light"] .help-intro{background:linear-gradient(135deg,rgba(99,102,241,0.1),rgba(236,72,153,0.06))}
[data-theme="light"] .quick-link{background:rgba(255,255,255,0.7);color:#4F46E5}
[data-theme="light"] .footer p{color:#64748B}
[data-theme="light"] .arrow{color:#64748B}
[data-theme="light"] .folder-count{color:#475569}
[data-theme="light"] .reset-btn{background:rgba(220,38,38,0.1);color:#DC2626;border-color:rgba(220,38,38,0.25)}
[data-theme="light"] .child-remove{background:rgba(220,38,38,0.1);color:#DC2626;border-color:rgba(220,38,38,0.25)}
[data-theme="light"] .remove-item-btn{background:rgba(220,38,38,0.1);color:#DC2626;border-color:rgba(220,38,38,0.25)}

/* === CUSTOM ITEM STYLES === */
.add-custom-item-btn{
  display:flex;align-items:center;gap:8px;width:100%;
  background:var(--bg-tertiary);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px dashed var(--border-light);border-radius:8px;
  padding:10px 14px;margin-top:12px;font-size:12px;font-weight:600;
  color:var(--text-muted);cursor:pointer;
  transition:all 0.3s ease;
}
.add-custom-item-btn:hover{
  border-color:var(--accent-primary);color:var(--accent-primary);
  background:rgba(99,102,241,0.08);
}
.add-custom-item-btn .add-icon{
  font-size:16px;font-weight:300;
}

/* Custom item in checklist */
.check-item.custom-item{
  border-left:3px solid var(--accent-primary);
  padding-left:12px;
}

/* Delete button for custom items */
.delete-custom-btn{
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);
  color:#FCA5A5;border-radius:6px;width:24px;height:24px;
  font-size:14px;cursor:pointer;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s ease;
}
.delete-custom-btn:hover{
  background:rgba(239,68,68,0.2);border-color:rgba(239,68,68,0.4);
}

/* Priority selector in modal */
.priority-selector{
  display:flex;gap:8px;flex-wrap:wrap;
}
.priority-option{
  display:flex;cursor:pointer;
}
.priority-option input[type="radio"]{
  position:absolute;opacity:0;pointer-events:none;
}
.priority-chip{
  padding:8px 16px;border-radius:20px;font-size:11px;font-weight:700;
  letter-spacing:0.5px;transition:all 0.3s ease;
}
.priority-option input[type="radio"]:checked + .priority-chip{
  box-shadow:0 0 0 2px var(--text-primary),inset 0 0 0 1px rgba(255,255,255,0.2);
  transform:scale(1.05);
}
.priority-option:hover .priority-chip{
  transform:scale(1.02);
}

/* Light mode custom item overrides */
[data-theme="light"] .add-custom-item-btn{
  background:rgba(255,255,255,0.7);color:#475569;
}
[data-theme="light"] .add-custom-item-btn:hover{
  color:#4F46E5;background:rgba(79,70,229,0.08);
}
[data-theme="light"] .delete-custom-btn{
  background:rgba(220,38,38,0.1);color:#DC2626;border-color:rgba(220,38,38,0.2);
}
[data-theme="light"] .check-item.custom-item{
  border-left-color:#4F46E5;
}

/* === URL FIELD STYLES === */
.url-field-wrapper{
  display:flex;align-items:center;gap:8px;
}
.url-field-wrapper .tpl-input{
  flex:1;
}
.url-link-display{
  display:flex;align-items:center;gap:8px;
  background:var(--bg-tertiary);
  border:1px solid var(--border-subtle);border-radius:8px;
  padding:10px 14px;flex:1;min-width:0;
}
.url-link{
  flex:1;min-width:0;
  color:var(--accent-primary);font-size:13px;font-weight:600;
  text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color 0.2s ease;
}
.url-link:hover{
  color:var(--accent-secondary);text-decoration:underline;
}
.url-edit-btn{
  background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);
  border-radius:6px;width:32px;height:32px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.3s ease;
  color:#A5B4FC;font-size:14px;
}
.url-edit-btn:hover{
  background:rgba(99,102,241,0.25);border-color:rgba(99,102,241,0.4);
}
.url-edit-btn svg{
  width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;
}
.url-open-btn{
  background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);
  border-radius:6px;width:32px;height:32px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.3s ease;
  color:#6EE7B7;font-size:14px;text-decoration:none;
}
.url-open-btn:hover{
  background:rgba(52,211,153,0.25);border-color:rgba(52,211,153,0.4);
}
.url-open-btn svg{
  width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;
}

/* Light mode URL field overrides */
[data-theme="light"] .url-link{color:#4F46E5}
[data-theme="light"] .url-link:hover{color:#7C3AED}
[data-theme="light"] .url-link-display{background:rgba(255,255,255,0.8)}
[data-theme="light"] .url-edit-btn{background:rgba(79,70,229,0.1);color:#4F46E5;border-color:rgba(79,70,229,0.25)}
[data-theme="light"] .url-open-btn{background:rgba(5,150,105,0.1);color:#047857;border-color:rgba(5,150,105,0.25)}

/* Autosave indicator styles */
.autosave-indicator{transition:color 0.3s ease}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
