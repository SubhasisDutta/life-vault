<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#g)"/>
  <rect x="8" y="8" width="112" height="112" rx="20" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="64" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="20" fill="rgba(255,255,255,0.7)" filter="url(#glow)">LIFE</text>
  <text x="64" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="28" fill="white" filter="url(#glow)">VAULT</text>
</svg>
